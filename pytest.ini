[pytest]
# Limit pytest auto-discovery to the safety-side test suite. The ROS2
# packages under `src/` have their own ament_python test setups that
# require the ROS2 toolchain (ament_pep257, ament_flake8, etc.) and
# should be run via `colcon test`, not directly via pytest from the
# repository root.
testpaths =
    cage/tests
    policy/tests
norecursedirs =
    src
    .venv
    .git
    build
    install
    log
